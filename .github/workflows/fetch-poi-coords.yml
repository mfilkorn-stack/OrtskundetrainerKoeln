name: Fetch POI Coordinates from OSM

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Re-fetch all POIs (ignore already-precise)"
        required: false
        default: "false"
        type: boolean
  push:
    branches: [main]
    paths:
      - "public/data/pois.json"

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check if POI data changed
        if: github.event_name == 'push'
        id: changed
        run: |
          if git diff --name-only HEAD~1 -- public/data/pois.json | grep -q .; then
            echo "POI data changed, will fetch coordinates."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "No POI changes detected, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch real POI coordinates from Overpass API
        if: steps.changed.outputs.skip != 'true'
        run: |
          ARGS=""
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          node scripts/fetch-poi-coords.mjs $ARGS

      - name: Commit updated POI coordinates
        if: steps.changed.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/pois.json src/types/street.ts
          git diff --cached --quiet || git commit -m "data: update POI coordinates from OSM (incremental)"
          git pull --rebase
          git push
