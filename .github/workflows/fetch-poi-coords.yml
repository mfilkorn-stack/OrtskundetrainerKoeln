name: Fetch POI Coordinates from OSM

on:
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch real POI coordinates from Overpass API
        run: node scripts/fetch-poi-coords.mjs

      - name: Commit updated POI coordinates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/pois.json src/types/street.ts
          git diff --cached --quiet || git commit -m "data: update POI coordinates with real OSM data"
          git pull --rebase
          git push
