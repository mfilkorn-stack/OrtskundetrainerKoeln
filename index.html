<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F1C3F" />
    <meta name="description" content="Straßenquiz-Trainer für die Feuerwehr Köln Innenstadt — Ortskunde für Rettungsdienst und Feuerwehr" />
    <link rel="icon" type="image/svg+xml" href="/OrtskundetrainerKoeln/favicon.svg" />
    <title>Ortskundetrainer Köln Innenstadt</title>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var el = document.getElementById('startup-error');
        if (el) {
          el.style.display = 'block';
          el.querySelector('.error-detail').textContent =
            (error && error.message ? error.message : msg) +
            (url ? ' (' + url.split('/').pop() + ':' + line + ')' : '');
        }
        return false;
      };
    </script>
  </head>
  <body>
    <div id="startup-error" style="display:none;padding:24px;text-align:center;font-family:sans-serif;">
      <h2 style="color:#0F1C3F;">Ladevorgang fehlgeschlagen</h2>
      <p class="error-detail" style="color:#5a6070;margin:12px 0;font-size:0.9rem;word-break:break-all;"></p>
      <button onclick="location.reload()" style="padding:10px 20px;background:#0F1C3F;color:#C5A23C;border:none;border-radius:8px;cursor:pointer;font-weight:600;">Neu laden</button>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
